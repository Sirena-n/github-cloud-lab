version: "3.9"
services:
  web:
    build: ./webapp
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
      - REDIS_HOST=redis
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
volumes:
  redis-data:
